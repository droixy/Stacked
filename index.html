// ─── Parse AI response into flashcard objects ───
function parseFlashcards(text) {
  const cards = [];
  // Match patterns like **Q:** ... **A:** ... or Q: ... A: ...
  const regex = /\*{0,2}Q:\*{0,2}\s*(.*?)(?:\n+)\*{0,2}A:\*{0,2}\s*(.*?)(?=\n\n\*{0,2}Q:|\n\n\*{0,2}Q:|\n\*{0,2}Q:|$)/gis;
  let match;
  while ((match = regex.exec(text)) !== null) {
    const q = match[1].trim().replace(/\*\*/g, "");
    const a = match[2].trim().replace(/\*\*/g, "");
    if (q && a) {
      cards.push({ id: cards.length, question: q, answer: a, status: "unseen" });
    }
  }
  // Fallback: try splitting by numbered Q/A
  if (cards.length === 0) {
    const lines = text.split("\n").filter(l => l.trim());
    let currentQ = null;
    for (const line of lines) {
      const qMatch = line.match(/^(?:\d+[\.\)]\s*)?(?:\*{0,2})Q(?:uestion)?(?:\*{0,2})?[:\s]+(.+)/i);
      const aMatch = line.match(/^(?:\*{0,2})A(?:nswer)?(?:\*{0,2})?[:\s]+(.+)/i);
      if (qMatch) { currentQ = qMatch[1].trim().replace(/\*\*/g, ""); }
      else if (aMatch && currentQ) {
        cards.push({ id: cards.length, question: currentQ, answer: aMatch[1].trim().replace(/\*\*/g, ""), status: "unseen" });
        currentQ = null;
      }
    }
  }
  return cards;
}

// ─── Flashcard Deck (full study session) ───
function FlashcardDeck({ cards: initialCards, deckTitle, theme, onClose, onSaveNote }) {
  const t = themes[theme];
  const [cards, setCards] = useState(initialCards.map(c => ({ ...c, status: "unseen" })));
  const [currentIndex, setCurrentIndex] = useState(0);
  const [flipped, setFlipped] = useState(false);
  const [mode, setMode] = useState("study"); // study | results
  const [studyQueue, setStudyQueue] = useState(initialCards.map((_, i) => i));

  const knownCards = cards.filter(c => c.status === "known");
  const studyAgainCards = cards.filter(c => c.status === "study-again");
  const unseenCards = cards.filter(c => c.status === "unseen");
  const currentQueuePos = studyQueue.indexOf(currentIndex);
  const currentCard = cards[currentIndex];
  const progress = cards.length > 0 ? ((cards.length - unseenCards.length) / cards.length) * 100 : 0;

  const markCard = (status) => {
    const updated = cards.map((c, i) => i === currentIndex ? { ...c, status } : c);
    setCards(updated);
    setFlipped(false);

    // Move to next card in queue
    const remaining = studyQueue.filter((idx, qPos) => {
      if (qPos <= currentQueuePos) return false;
      return true;
    });

    if (remaining.length > 0) {
      setTimeout(() => setCurrentIndex(remaining[0]), 200);
    } else {
      // Check if there are "study-again" cards to review
      const studyAgainIdxs = updated
        .map((c, i) => c.status === "study-again" ? i : -1)
        .filter(i => i !== -1);
      if (studyAgainIdxs.length > 0) {
        setStudyQueue(studyAgainIdxs);
        setTimeout(() => setCurrentIndex(studyAgainIdxs[0]), 200);
      } else {
        setTimeout(() => setMode("results"), 300);
      }
    }
  };

  const restartDeck = () => {
    setCards(initialCards.map(c => ({ ...c, status: "unseen" })));
    setStudyQueue(initialCards.map((_, i) => i));
    setCurrentIndex(0);
    setFlipped(false);
    setMode("study");
  };

  const studyMissedOnly = () => {
    const missed = cards.map((c, i) => c.status === "study-again" ? i : -1).filter(i => i !== -1);
    if (missed.length === 0) return;
    setCards(cards.map(c => c.status === "study-again" ? { ...c, status: "unseen" } : c));
    setStudyQueue(missed);
    setCurrentIndex(missed[0]);
    setFlipped(false);
    setMode("study");
  };

  if (mode === "results") {
    return (
      <div style={{
        background: t.card, borderRadius: 20, padding: "40px 32px",
        border: `1px solid ${t.border}`, maxWidth: 520, margin: "0 auto",
        textAlign: "center", boxShadow: t.cardShadow,
      }}>
        <div style={{ fontSize: 56, marginBottom: 16 }}>🎉</div>
        <h3 style={{ fontSize: 24, fontWeight: 800, color: t.text, marginBottom: 8 }}>Session Complete!</h3>
        <p style={{ color: t.textMuted, fontSize: 14, marginBottom: 28 }}>{deckTitle}</p>

        <div style={{ display: "flex", gap: 16, justifyContent: "center", marginBottom: 28 }}>
          <div style={{
            background: `${t.success}15`, borderRadius: 14, padding: "16px 24px",
            border: `1px solid ${t.success}30`, minWidth: 100,
          }}>
            <div style={{ fontSize: 28, fontWeight: 800, color: t.success }}>{knownCards.length}</div>
            <div style={{ fontSize: 11, color: t.success, fontWeight: 600, marginTop: 4 }}>Known</div>
          </div>
          <div style={{
            background: `${t.danger}15`, borderRadius: 14, padding: "16px 24px",
            border: `1px solid ${t.danger}30`, minWidth: 100,
          }}>
            <div style={{ fontSize: 28, fontWeight: 800, color: t.danger }}>{studyAgainCards.length}</div>
            <div style={{ fontSize: 11, color: t.danger, fontWeight: 600, marginTop: 4 }}>Review</div>
          </div>
        </div>

        <div style={{
          height: 8, background: t.inputBg, borderRadius: 4, overflow: "hidden", marginBottom: 28,
        }}>
          <div style={{
            width: `${cards.length > 0 ? (knownCards.length / cards.length) * 100 : 0}%`,
            height: "100%", background: t.success, borderRadius: 4, transition: "width 0.5s",
          }} />
        </div>

        <div style={{ display: "flex", gap: 12, flexWrap: "wrap", justifyContent: "center" }}>
          {studyAgainCards.length > 0 && (
            <button onClick={studyMissedOnly} style={{
              padding: "12px 24px", borderRadius: 12, border: "none",
              background: `${t.danger}15`, color: t.danger, fontSize: 14, fontWeight: 600,
              cursor: "pointer", fontFamily: "'Poppins', sans-serif",
            }}>Study Missed ({studyAgainCards.length})</button>
          )}
          <button onClick={restartDeck} style={{
            padding: "12px 24px", borderRadius: 12, border: `1px solid ${t.border}`,
            background: "transparent", color: t.textMuted, fontSize: 14, fontWeight: 600,
            cursor: "pointer", fontFamily: "'Poppins', sans-serif",
          }}>Restart All</button>
          {onSaveNote && (
            <button onClick={() => {
              const content = cards.map(c => `Q: ${c.question}\nA: ${c.answer}`).join("\n\n");
              onSaveNote({
                id: Date.now(), title: deckTitle,
                content, question: `Generate flashcards about: ${deckTitle}`,
                tag: "flashcards", source: "turbo",
                date: new Date().toLocaleDateString(), pinned: false,
              });
            }} style={{
              padding: "12px 24px", borderRadius: 12, border: "none",
              background: `${t.secondary}15`, color: t.secondary, fontSize: 14, fontWeight: 600,
              cursor: "pointer", fontFamily: "'Poppins', sans-serif",
            }}>📂 Save to Notes</button>
          )}
          <button onClick={onClose} style={{
            padding: "12px 24px", borderRadius: 12, border: "none",
            background: t.gradient, color: "#fff", fontSize: 14, fontWeight: 600,
            cursor: "pointer", fontFamily: "'Poppins', sans-serif",
          }}>New Deck</button>
        </div>
      </div>
    );
  }

  if (!currentCard) return null;

  return (
    <div style={{ maxWidth: 580, margin: "0 auto" }}>
      {/* Deck header */}
      <div style={{
        display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 20,
      }}>
        <div>
          <h3 style={{ fontSize: 16, fontWeight: 700, color: t.text, marginBottom: 2 }}>{deckTitle}</h3>
          <span style={{ fontSize: 12, color: t.textMuted }}>
            Card {currentQueuePos + 1} of {studyQueue.length} • {knownCards.length} known
          </span>
        </div>
        <button onClick={onClose} style={{
          padding: "6px 14px", borderRadius: 8, border: `1px solid ${t.border}`,
          background: "transparent", color: t.textMuted, fontSize: 12, fontWeight: 500,
          cursor: "pointer", fontFamily: "'Poppins', sans-serif",
        }}>✕ Close</button>
      </div>

      {/* Progress bar */}
      <div style={{
        height: 6, background: t.inputBg, borderRadius: 3, overflow: "hidden", marginBottom: 24,
        display: "flex",
      }}>
        <div style={{
          width: `${cards.length > 0 ? (knownCards.length / cards.length) * 100 : 0}%`,
          height: "100%", background: t.success, transition: "width 0.4s ease",
        }} />
        <div style={{
          width: `${cards.length > 0 ? (studyAgainCards.length / cards.length) * 100 : 0}%`,
          height: "100%", background: t.danger, transition: "width 0.4s ease",
        }} />
      </div>

      {/* Card */}
      <Flashcard card={currentCard} flipped={flipped} onFlip={() => setFlipped(!flipped)} theme={theme} />

      {/* Action buttons */}
      <div style={{
        display: "flex", gap: 16, justifyContent: "center", marginTop: 24,
        opacity: flipped ? 1 : 0.3, pointerEvents: flipped ? "auto" : "none",
        transition: "opacity 0.3s",
      }}>
        <button onClick={() => markCard("study-again")} style={{
          display: "flex", alignItems: "center", gap: 8,
          padding: "14px 28px", borderRadius: 14, border: "none",
          background: `${t.danger}15`, color: t.danger,
          fontSize: 15, fontWeight: 600, cursor: "pointer",
          fontFamily: "'Poppins', sans-serif", transition: "all 0.2s",
          boxShadow: `0 4px 16px ${t.danger}10`,
        }}
          onMouseEnter={e => e.currentTarget.style.background = `${t.danger}25`}
          onMouseLeave={e => e.currentTarget.style.background = `${t.danger}15`}
        >
          <span style={{ fontSize: 18 }}>🔄</span> Study Again
        </button>
        <button onClick={() => markCard("known")} style={{
          display: "flex", alignItems: "center", gap: 8,
          padding: "14px 28px", borderRadius: 14, border: "none",
          background: `${t.success}15`, color: t.success,
          fontSize: 15, fontWeight: 600, cursor: "pointer",
          fontFamily: "'Poppins', sans-serif", transition: "all 0.2s",
          boxShadow: `0 4px 16px ${t.success}10`,
        }}
          onMouseEnter={e => e.currentTarget.style.background = `${t.success}25`}
          onMouseLeave={e => e.currentTarget.style.background = `${t.success}15`}
        >
          <span style={{ fontSize: 18 }}>✅</span> Know It
        </button>
      </div>

      {/* Hint text */}
      {!flipped && (
        <p style={{ textAlign: "center", color: t.textMuted, fontSize: 12, marginTop: 16, opacity: 0.6 }}>
          Click the card to flip it, then rate yourself
        </p>
      )}

      {/* Card counter dots */}
      <div style={{
        display: "flex", justifyContent: "center", gap: 6, marginTop: 20, flexWrap: "wrap",
      }}>
        {cards.map((c, i) => (
          <div key={i} style={{
            width: 8, height: 8, borderRadius: 4,
            background: c.status === "known" ? t.success :
              c.status === "study-again" ? t.danger :
              i === currentIndex ? t.primary : t.border,
            transition: "background 0.3s, transform 0.2s",
            transform: i === currentIndex ? "scale(1.4)" : "scale(1)",
          }} />
        ))}
      </div>
    </div>
  );
}

  return (
    <div style={{ marginTop: 24 }}>
      <h4 style={{ fontSize: 13, fontWeight: 600, color: t.textMuted, textTransform: "uppercase", letterSpacing: 1, marginBottom: 12 }}>
        Your Decks ({decks.length})
      </h4>
      <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
        {decks.map((deck, i) => (
          <div key={i} style={{
            background: t.card, borderRadius: 12, padding: "14px 18px",
            border: `1px solid ${t.border}`, display: "flex",
            alignItems: "center", justifyContent: "space-between",
            cursor: "pointer", transition: "all 0.2s",
          }}
            onClick={() => onSelectDeck(deck)}
            onMouseEnter={e => { e.currentTarget.style.borderColor = t.primary; e.currentTarget.style.transform = "translateX(4px)"; }}
            onMouseLeave={e => { e.currentTarget.style.borderColor = t.border; e.currentTarget.style.transform = "translateX(0)"; }}
          >
            <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
              <span style={{ fontSize: 20 }}>⚡</span>
              <div>
                <div style={{ fontSize: 14, fontWeight: 600, color: t.text }}>{deck.title}</div>
                <div style={{ fontSize: 11, color: t.textMuted }}>{deck.cards.length} cards • {deck.date}</div>
              </div>
            </div>
            <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
              <span style={{ fontSize: 12, color: t.textMuted, fontWeight: 500 }}>Study →</span>
              <button onClick={(e) => { e.stopPropagation(); onDeleteDeck(i); }} style={{
                background: "none", border: "none", cursor: "pointer", fontSize: 14,
                color: t.textMuted, padding: 4, lineHeight: 1,
              }}
                onMouseEnter={e => e.currentTarget.style.color = t.danger}
                onMouseLeave={e => e.currentTarget.style.color = t.textMuted}
              >✕</button>
            </div>
          </div>
        ))}
      </div>
    </div>
  );
}

  const t = themes[theme];
  const tool = AI_TOOLS.find(t => t.id === "turbo");
  const [input, setInput] = useState("");
  const [loading, setLoading] = useState(false);
  const [activeDeck, setActiveDeck] = useState(null);
  const [deckTitle, setDeckTitle] = useState("");

  const generateFlashcards = async () => {
    if (!input.trim() || loading) return;
    if (tokensUsed >= tokenQuota) { onOutOfTokens(); return; }

    const topic = input.trim();
    setInput(""); setLoading(true);

    if (isDemo) {
      await new Promise(r => setTimeout(r, 1000 + Math.random() * 1000));
      const cards = parseFlashcards(DEMO_RESPONSES.turbo);
      const fakeCost = Math.floor(120 + Math.random() * 100);
      onTokenUpdate(tokensUsed + fakeCost);
      const deck = { title: topic, cards, date: new Date().toLocaleDateString() };
      setSavedDecks([deck, ...savedDecks]);
      setDeckTitle(topic);
      setActiveDeck(cards);
      setLoading(false);
      return;
    }

    try {
      const res = await fetch(`${API_BASE}${tool.endpoint}`, {
        method: "POST", headers: { "Content-Type": "application/json", Authorization: `Bearer ${user.token}` },
        body: JSON.stringify({ message: `Create flashcards about: ${topic}` }),
      });
      const data = await res.json();
      if (data.error === "TOKEN_LIMIT_EXCEEDED") { onOutOfTokens(); }
      else {
        const cards = parseFlashcards(data.response || "");
        if (data.tokens_used != null) onTokenUpdate(data.tokens_used);
        if (cards.length > 0) {
          const deck = { title: topic, cards, date: new Date().toLocaleDateString() };
          setSavedDecks([deck, ...savedDecks]);
          setDeckTitle(topic);
          setActiveDeck(cards);
        }
      }
    } catch {
      // Error handling
    }
    setLoading(false);
  };

  return (
    <div style={{ display: "flex", flexDirection: "column", flex: 1 }}>
      {/* Header */}
      <div style={{ padding: "16px 24px", borderBottom: `1px solid ${t.border}`, display: "flex", alignItems: "center", gap: 14 }}>
        <div style={{
          width: 44, height: 44, borderRadius: 12, display: "flex",
          alignItems: "center", justifyContent: "center", fontSize: 22, background: `${tool.color}20`,
        }}>{tool.icon}</div>
        <div>
          <div style={{ fontSize: 17, fontWeight: 700, color: t.text }}>Flashcards</div>
          <div style={{ fontSize: 12, color: t.textMuted }}>Turbo AI • Interactive Study Cards</div>
        </div>
        {isDemo && <div style={{
          marginLeft: "auto", fontSize: 11, fontWeight: 600, padding: "4px 12px",
          borderRadius: 20, background: `${t.secondary}20`, color: t.secondary,
        }}>DEMO</div>}
      </div>

      <div style={{ flex: 1, overflow: "auto", padding: "24px" }}>
        {activeDeck ? (
          <FlashcardDeck
            cards={activeDeck}
            deckTitle={deckTitle}
            theme={theme}
            onClose={() => setActiveDeck(null)}
            onSaveNote={onSaveNote}
          />
        ) : (
          <div style={{ maxWidth: 600, margin: "0 auto" }}>
            {/* Generate new deck */}
            <div style={{
              background: t.card, borderRadius: 20, padding: "36px 28px",
              border: `1px solid ${t.border}`, textAlign: "center",
              boxShadow: t.cardShadow,
            }}>
              <div style={{ fontSize: 56, marginBottom: 16 }}>⚡</div>
              <h3 style={{ fontSize: 22, fontWeight: 700, color: t.text, marginBottom: 8 }}>Generate Flashcards</h3>
              <p style={{ color: t.textMuted, fontSize: 14, marginBottom: 24, lineHeight: 1.6 }}>
                Enter any topic and AI will create interactive flashcards for you.
                {isDemo && <span style={{ color: t.secondary, display: "block", marginTop: 8, fontWeight: 500 }}>
                  Demo mode — try any topic to see sample cards
                </span>}
              </p>

              <div style={{ display: "flex", gap: 12 }}>
                <input value={input} onChange={e => setInput(e.target.value)}
                  onKeyDown={e => { if (e.key === "Enter") generateFlashcards(); }}
                  placeholder="e.g. Cell Biology, French Revolution, JavaScript basics..."
                  style={{
                    flex: 1, padding: "14px 16px", borderRadius: 14, border: `1px solid ${t.border}`,
                    background: t.inputBg, color: t.text, fontSize: 15, fontFamily: "'Poppins', sans-serif",
                    outline: "none",
                  }} />
                <button onClick={generateFlashcards} disabled={loading || !input.trim()} style={{
                  padding: "14px 24px", borderRadius: 14, border: "none",

                  color: input.trim() ? "#fff" : t.textMuted,
                  fontSize: 15, fontWeight: 600, cursor: input.trim() ? "pointer" : "default",
                  fontFamily: "'Poppins', sans-serif", whiteSpace: "nowrap",
                  boxShadow: input.trim() ? `0 4px 16px ${t.primary}30` : "none",
                }}>
                  {loading ? (
                    <span style={{ animation: "pulse 1.5s ease-in-out infinite" }}>Creating...</span>

              </div>

              {/* Quick topic suggestions */}
              <div style={{ display: "flex", gap: 8, flexWrap: "wrap", justifyContent: "center", marginTop: 16 }}>
                {["Cell Biology", "World War II", "Python Basics", "Calculus", "Spanish Vocab"].map(topic => (
                  <button key={topic} onClick={() => setInput(topic)} style={{
                    padding: "5px 14px", borderRadius: 20, border: `1px solid ${t.border}`,
                    background: "transparent", color: t.textMuted, fontSize: 12,

                    onMouseLeave={e => { e.currentTarget.style.borderColor = t.border; e.currentTarget.style.color = t.textMuted; }}
                  >{topic}</button>
                ))}

            </div>

            {/* Saved decks */}
            <SavedDecks

    </div>
  );
}

function TokenCounter({ used, quota, theme, compact }) {
  const t = themes[theme];
  const remaining = Math.max(0, quota - used);
  const remainPct = quota > 0 ? (remaining / quota) * 100 : 0;
  const barColor = remainPct < 10 ? t.danger : remainPct < 30 ? t.warning : t.success;
  const statusText = remainPct < 10 ? "Critical" : remainPct < 30 ? "Running low" : remainPct < 60 ? "Good" : "Healthy";
  const statusColor = remainPct < 10 ? t.danger : remainPct < 30 ? t.warning : t.success;

  if (compact) {
    return (
      <div style={{ padding: "0 6px" }}>
        <div style={{ height: 4, background: t.inputBg, borderRadius: 2, overflow: "hidden" }}>
          <div style={{ width: `${remainPct}%`, height: "100%", borderRadius: 2, background: barColor, transition: "width 0.5s ease" }} />
        </div>
      </div>
    );
  }

  return (
    <div style={{ padding: "0 6px" }}>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 6 }}>
        <span style={{ fontSize: 10, color: t.textMuted, fontWeight: 600, letterSpacing: 0.5, textTransform: "uppercase" }}>Tokens</span>
        <span style={{ fontSize: 10, color: statusColor, fontWeight: 600 }}>{statusText}</span>
      </div>
      <div style={{ fontSize: 18, fontWeight: 700, color: t.text, marginBottom: 2 }}>
        {remaining.toLocaleString()}
      </div>
      <div style={{ fontSize: 10, color: t.textMuted, marginBottom: 8 }}>
        of {quota.toLocaleString()} remaining
      </div>
      <div style={{ height: 6, background: t.inputBg, borderRadius: 3, overflow: "hidden" }}>
        <div style={{ width: `${remainPct}%`, height: "100%", borderRadius: 3, background: barColor, transition: "width 0.5s ease" }} />
      </div>
    </div>
  );
}

      <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(280px, 1fr))", gap: 16 }}>

            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 10 }}>

                <span style={{
                  fontSize: 11, fontWeight: 600, padding: "3px 10px", borderRadius: 6,
                  background: `${tagColors[note.tag] || t.primary}20`, color: tagColors[note.tag] || t.primary,
                  textTransform: "uppercase", letterSpacing: 0.5,

              <div style={{ display: "flex", gap: 4 }}>

                  background: "none", border: "none", cursor: "pointer", fontSize: 16, padding: 4, opacity: note.pinned ? 1 : 0.4,
                }}>📌</button>
                <button onClick={(e) => { e.stopPropagation(); setNotes(notes.filter(n => n.id !== note.id)); }} style={{
                  background: "none", border: "none", cursor: "pointer", fontSize: 14, padding: 4, color: t.textMuted,

            <p style={{ fontSize: 15 }}>No notes yet. Save an AI response or add your own!</p>

        )}
      </div>
    </div>
  );
}

function ChatView({ tool, theme, user, tokensUsed, tokenQuota, onTokenUpdate, onOutOfTokens, isDemo, onSaveNote }) {
  const t = themes[theme];
  const [messages, setMessages] = useState([]);
  const [input, setInput] = useState("");
  const [loading, setLoading] = useState(false);
  const [savedMsgIds, setSavedMsgIds] = useState(new Set());
  const endRef = useRef(null);

  useEffect(() => { endRef.current && endRef.current.scrollIntoView({ behavior: "smooth" }); }, [messages]);

  const sendMessage = async () => {
    if (!input.trim() || loading) return;
    if (tokensUsed >= tokenQuota) { onOutOfTokens(); return; }
    const userMsg = { role: "user", text: input, time: new Date().toLocaleTimeString() };
    setMessages(prev => [...prev, userMsg]);
    const currentInput = input;
    setInput(""); setLoading(true);

    if (isDemo) {
      await new Promise(r => setTimeout(r, 800 + Math.random() * 1200));
      const demoText = DEMO_RESPONSES[tool.id] || "This is a demo response!";
      const fakeCost = Math.floor(80 + Math.random() * 150);
      setMessages(prev => [...prev, { role: "assistant", text: demoText, time: new Date().toLocaleTimeString(), tokens: fakeCost }]);
      onTokenUpdate(tokensUsed + fakeCost);
      setLoading(false);
      return;
    }

    try {
      const res = await fetch(`${API_BASE}${tool.endpoint}`, {
        method: "POST", headers: { "Content-Type": "application/json", Authorization: `Bearer ${user.token}` },
        body: JSON.stringify({ message: currentInput }),
      });
      const data = await res.json();
      if (data.error === "TOKEN_LIMIT_EXCEEDED") { onOutOfTokens(); }
      else {
        setMessages(prev => [...prev, {
          role: "assistant", text: data.response || data.error || "No response",
          time: new Date().toLocaleTimeString(), tokens: data.tokens_used_this_request || 0,
        }]);
        if (data.tokens_used != null) onTokenUpdate(data.tokens_used);
      }
    } catch {
      setMessages(prev => [...prev, { role: "assistant", text: "Failed to reach the server.", time: new Date().toLocaleTimeString() }]);
    }
    setLoading(false);
  };

  return (
    <div style={{ display: "flex", flexDirection: "column", flex: 1 }}>
      <div style={{ padding: "16px 24px", borderBottom: `1px solid ${t.border}`, display: "flex", alignItems: "center", gap: 14 }}>
        <div style={{
          width: 44, height: 44, borderRadius: 12, display: "flex",
          alignItems: "center", justifyContent: "center", fontSize: 22, background: `${tool.color}20`,
        }}>{tool.icon}</div>
        <div>
          <div style={{ fontSize: 17, fontWeight: 700, color: t.text }}>{tool.name}</div>
          <div style={{ fontSize: 12, color: t.textMuted }}>{tool.subtitle} • Max 500 tokens/prompt</div>
        </div>
        {isDemo && <div style={{
          marginLeft: "auto", fontSize: 11, fontWeight: 600, padding: "4px 12px",
          borderRadius: 20, background: `${t.secondary}20`, color: t.secondary,
        }}>DEMO</div>}
      </div>
      <div style={{ flex: 1, overflow: "auto", padding: "20px 24px" }}>
        {messages.length === 0 && (
          <div style={{ textAlign: "center", padding: "80px 20px", color: t.textMuted }}>
            <div style={{ fontSize: 64, marginBottom: 16 }}>{tool.icon}</div>
            <h3 style={{ fontSize: 20, fontWeight: 600, color: t.text, marginBottom: 8 }}>{tool.name}</h3>
            <p style={{ fontSize: 14, maxWidth: 400, margin: "0 auto", lineHeight: 1.6 }}>{tool.desc}</p>
            {isDemo && <p style={{ fontSize: 13, color: t.secondary, marginTop: 16, fontWeight: 500 }}>Demo mode — type anything to see a sample response</p>}
          </div>
        )}
        {messages.map((msg, i) => (
          <div key={i} style={{ display: "flex", justifyContent: msg.role === "user" ? "flex-end" : "flex-start", marginBottom: 16 }}>
            <div style={{
              maxWidth: "75%", padding: "14px 18px", borderRadius: 16,
              background: msg.role === "user" ? t.gradient : t.card,
              color: msg.role === "user" ? "#fff" : t.text,
              border: msg.role === "user" ? "none" : `1px solid ${t.border}`,
              fontSize: 14, lineHeight: 1.7, whiteSpace: "pre-wrap",
              borderBottomRightRadius: msg.role === "user" ? 4 : 16,
              borderBottomLeftRadius: msg.role === "user" ? 16 : 4,
            }}>
              {msg.text}
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginTop: 6 }}>
                <span style={{ fontSize: 10, opacity: 0.6 }}>
                  {msg.time}{msg.tokens ? ` • ${msg.tokens} tokens` : ""}
                </span>
                {msg.role === "assistant" && onSaveNote && (
                  <button
                    onClick={(e) => {
                      e.stopPropagation();
                      const prevUserMsg = messages.slice(0, i).reverse().find(m => m.role === "user");
                      const title = prevUserMsg
                        ? prevUserMsg.text.slice(0, 60) + (prevUserMsg.text.length > 60 ? "..." : "")
                        : `${tool.name} response`;
                      const tagMap = { chatgpt: "general", perplexity: "research", claude: "writing", turbo: "flashcards", wolfram: "math" };
                      onSaveNote({
                        id: Date.now(),
                        title,
                        content: msg.text,
                        question: prevUserMsg && prevUserMsg.text || "",
                        tag: tagMap[tool.id] || "general",
                        source: tool.id,
                        date: new Date().toLocaleDateString(),
                        pinned: false,
                      });
                      setSavedMsgIds(prev => new Set([...prev, i]));
                    }}
                    disabled={savedMsgIds.has(i)}
                    style={{
                      background: savedMsgIds.has(i) ? `${t.success}15` : `${t.primary}15`,
                      border: "none", borderRadius: 6, padding: "3px 10px",
                      fontSize: 10, fontWeight: 600, cursor: savedMsgIds.has(i) ? "default" : "pointer",
                      color: savedMsgIds.has(i) ? t.success : t.primary,
                      fontFamily: "'Poppins', sans-serif", transition: "all 0.2s",
                    }}
                  >{savedMsgIds.has(i) ? "✓ Saved" : "📂 Save"}</button>
                )}
              </div>
            </div>
          </div>
        ))}
        {loading && (
          <div style={{ display: "flex", justifyContent: "flex-start", marginBottom: 16 }}>
            <div style={{
              padding: "14px 18px", borderRadius: 16, background: t.card,
              border: `1px solid ${t.border}`, color: t.textMuted, fontSize: 14, borderBottomLeftRadius: 4,
            }}><span style={{ animation: "pulse 1.5s ease-in-out infinite" }}>Thinking...</span></div>
          </div>
        )}
        <div ref={endRef} />
      </div>
      <div style={{ padding: "16px 24px", borderTop: `1px solid ${t.border}`, display: "flex", gap: 12, alignItems: "flex-end" }}>
        <textarea value={input} onChange={e => setInput(e.target.value)}
          onKeyDown={e => { if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); sendMessage(); } }}
          placeholder={tool.placeholder} rows={1}
          style={{
            flex: 1, padding: "14px 16px", borderRadius: 14, border: `1px solid ${t.border}`,
            background: t.inputBg, color: t.text, fontSize: 15, fontFamily: "'Poppins', sans-serif",
            outline: "none", resize: "none", minHeight: 48, maxHeight: 120,
          }} />
        <button onClick={sendMessage} disabled={loading || !input.trim()} style={{
          width: 48, height: 48, borderRadius: 14, border: "none",
          background: input.trim() ? t.gradient : t.inputBg,
          color: input.trim() ? "#fff" : t.textMuted, fontSize: 20,
          cursor: input.trim() ? "pointer" : "default", display: "flex",
          alignItems: "center", justifyContent: "center", flexShrink: 0,
        }}>↑</button>
      </div>
    </div>
  );
}

                </p>
              </div>
              <h3 style={{ fontSize: 16, fontWeight: 700, color: t.text, marginBottom: 16 }}>AI Study Tools</h3>
              <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(260px, 1fr))", gap: 16, marginBottom: 32 }}>
                {AI_TOOLS.map(tool => (
                  <div key={tool.id} onClick={() => { setActiveTool(tool); setPage(tool.id === "turbo" ? "flashcards" : "chat"); }}
                    style={{
                      background: t.card, borderRadius: 16, padding: 24, cursor: "pointer",
                      border: `1px solid ${t.border}`, transition: "all 0.25s ease", position: "relative", overflow: "hidden",
                    }}
                    onMouseEnter={e => { e.currentTarget.style.transform = "translateY(-4px)"; e.currentTarget.style.borderColor = tool.color; e.currentTarget.style.boxShadow = `0 8px 32px ${tool.color}20`; }}
                    onMouseLeave={e => { e.currentTarget.style.transform = "translateY(0)"; e.currentTarget.style.borderColor = t.border; e.currentTarget.style.boxShadow = "none"; }}
                  >
                    <div style={{ position: "absolute", top: 0, right: 0, width: 80, height: 80, borderRadius: "0 0 0 80px", background: `${tool.color}08` }} />
                    <div style={{
                      width: 48, height: 48, borderRadius: 14, display: "flex",
                      alignItems: "center", justifyContent: "center", fontSize: 24, background: `${tool.color}15`, marginBottom: 14,
                    }}>{tool.icon}</div>
                    <h4 style={{ fontSize: 17, fontWeight: 700, color: t.text, marginBottom: 4 }}>{tool.name}</h4>
                    <p style={{ fontSize: 12, color: tool.color, fontWeight: 500, marginBottom: 10 }}>{tool.subtitle}</p>
                    <p style={{ fontSize: 13, color: t.textMuted, lineHeight: 1.6 }}>{tool.desc}</p>
                  </div>
                ))}
              </div>
              <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(200px, 1fr))", gap: 16 }}>
                {[
                  { label: "Plan", value: currentPlan.charAt(0).toUpperCase() + currentPlan.slice(1), icon: "⭐" },
                  { label: "Tokens Used", value: tokensUsed.toLocaleString(), icon: "📊" },
                  { label: "Tokens Left", value: Math.max(0, tokenQuota - tokensUsed).toLocaleString(), icon: "🎯" },
                  { label: "Flashcard Decks", value: savedDecks.length, icon: "⚡" },
                ].map((stat, i) => (
                  <div key={i} style={{
                    background: t.card, borderRadius: 14, padding: "18px 20px",
                    border: `1px solid ${t.border}`, display: "flex", alignItems: "center", gap: 14,
                  }}>
                    <div style={{
                      width: 42, height: 42, borderRadius: 12, display: "flex",
                      alignItems: "center", justifyContent: "center", fontSize: 20, background: `${t.primary}10`,
                    }}>{stat.icon}</div>
                    <div>
                      <div style={{ fontSize: 11, color: t.textMuted, fontWeight: 500, textTransform: "uppercase", letterSpacing: 0.5 }}>{stat.label}</div>
                      <div style={{ fontSize: 20, fontWeight: 700, color: t.text }}>{stat.value}</div>
                    </div>
                  </div>
                ))}
              </div>
            </div>
          )}
          {page === "chat" && activeTool && (
            <ChatView tool={activeTool} theme={theme} user={user}
              tokensUsed={tokensUsed} tokenQuota={tokenQuota}
              onTokenUpdate={setTokensUsed} onOutOfTokens={() => setShowOutOfTokens(true)}
              isDemo={isDemo}
              onSaveNote={(note) => setNotes(prev => [note, ...prev])} />
          )}
          {page === "flashcards" && (
            <FlashcardView theme={theme} user={user}
              tokensUsed={tokensUsed} tokenQuota={tokenQuota}
              onTokenUpdate={setTokensUsed} onOutOfTokens={() => setShowOutOfTokens(true)}
              isDemo={isDemo} savedDecks={savedDecks} setSavedDecks={setSavedDecks}
              onSaveNote={(note) => setNotes(prev => [note, ...prev])} />
          )}
          {page === "organizer" && (
            <div style={{ padding: "32px 24px 80px", maxWidth: 1100, margin: "0 auto" }}>
              <StudyOrganizer theme={theme} notes={notes} setNotes={setNotes} />
            </div>
          )}
        </div>
      </div>


      {showPlans && (
        <SubscriptionModal theme={theme} currentPlan={currentPlan}
          onSelect={(id) => { setCurrentPlan(id); const p = PLANS.find(x=>x.id===id); if(p) setTokenQuota(p.tokens); setShowPlans(false); }}
          onClose={() => setShowPlans(false)} />
      )}
      {showOutOfTokens && (
        <OutOfTokensModal theme={theme}
          onUpgrade={() => { setShowOutOfTokens(false); setShowPlans(true); }}
          onClose={() => setShowOutOfTokens(false)} />
      )}

      <style>{`
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap');
        @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
        @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-30px)} }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: ${t.border}; border-radius: 3px; }
        html, body, #root { height: 100%; }
      `}</style>
    </div>
  );
}

    ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
  </script>
</body>
</html>
